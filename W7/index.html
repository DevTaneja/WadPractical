<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook Clone</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f0f2f5;
      }
      .topbar {
        background: #1877f2;
        color: white;
        padding: 10px;
      }
      .fb-logo {
        font-size: 28px;
        font-weight: bold;
      }
      .signup-box {
        background: white;
        padding: 20px;
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <!-- Topbar -->

    <div class="topbar">
      <div class="container d-flex justify-content-between align-items-center">
        ```
        <div class="fb-logo">facebook</div>

        <div class="d-flex gap-2">
          <input
            id="loginEmail"
            type="text"
            placeholder="Email"
            class="form-control form-control-sm"
          />
          <input
            id="loginPass"
            type="password"
            placeholder="Password"
            class="form-control form-control-sm"
          />
          <button onclick="login()" class="btn btn-light btn-sm">Login</button>
        </div>
        ```
      </div>
    </div>

    <!-- Main -->

    <div class="container mt-5">
      <div class="row">
        ```
        <!-- Left -->
        <div class="col-md-6">
          <h4>Facebook is useless without friends.</h4>
          <p>Make more friends.</p>
          <img src="https://via.placeholder.com/400" class="img-fluid" />
        </div>

        <!-- Right -->
        <div class="col-md-6">
          <div class="signup-box">
            <h3>Create an Account</h3>
            <p>It's free and always will be.</p>

            <div class="row mb-2">
              <div class="col">
                <input
                  type="text"
                  placeholder="First name"
                  class="form-control"
                />
              </div>
              <div class="col">
                <input
                  type="text"
                  placeholder="Last name"
                  class="form-control"
                />
              </div>
            </div>

            <input
              id="signupEmail"
              type="email"
              placeholder="Email"
              class="form-control mb-2"
            />
            <input
              id="signupPass"
              type="password"
              placeholder="Password"
              class="form-control mb-2"
            />

            <input type="date" class="form-control mb-2" />

            <div class="mb-2">
              <input type="radio" name="gender" /> Male
              <input type="radio" name="gender" /> Female
            </div>

            <button onclick="signup()" class="btn btn-success w-100">
              Signup
            </button>
          </div>
        </div>
        ```
      </div>
    </div>

    <script>
      function signup() {
        let email = document.getElementById("signupEmail").value;
        let pass = document.getElementById("signupPass").value;

        if (email === "" || pass === "") {
          alert("Fill all fields");
          return;
        }

        let users = JSON.parse(localStorage.getItem("users")) || [];

        users.push({ email: email, pass: pass });

        localStorage.setItem("users", JSON.stringify(users));

        alert("Signup successful!");
      }

      function login() {
        let email = document.getElementById("loginEmail").value;
        let pass = document.getElementById("loginPass").value;

        let users = JSON.parse(localStorage.getItem("users")) || [];

        let found = users.find((u) => u.email === email && u.pass === pass);

        if (found) {
          window.location.href = "home.html";
        } else {
          alert("Invalid login");
        }
      }
    </script>
  </body>
</html>
