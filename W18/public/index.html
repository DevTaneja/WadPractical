<!doctype html>

<html>
  <head>
    <title>Song Details</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <h3 class="text-center mb-4">Song Details</h3>

      <!-- Add Form -->

      <div class="mb-4">
        <input id="song" class="form-control mb-2" placeholder="Song Name" />
        <input id="film" class="form-control mb-2" placeholder="Film" />
        <input id="md" class="form-control mb-2" placeholder="Music Director" />
        <input id="singer" class="form-control mb-2" placeholder="Singer" />

        ```
        <button onclick="addSong()" class="btn btn-primary">Add Song</button>
        ```
      </div>

      <!-- Table -->

      <table class="table table-bordered">
        <thead>
          <tr>
            <th>Song</th>
            <th>Film</th>
            <th>Music Director</th>
            <th>Singer</th>
            <th>Actor</th>
            <th>Actress</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="data"></tbody>
      </table>
    </div>

    <script src="script.js"></script>
  </body>
</html>
