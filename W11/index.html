<!doctype html>

<html>
  <head>
    <title>Login & Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <h3 class="text-center mb-4">Register</h3>

      <form id="regForm">
        ```
        <input id="name" class="form-control mb-2" placeholder="Name" />
        <small class="text-danger" id="nameError"></small>

        <input id="email" class="form-control mb-2" placeholder="Email" />
        <small class="text-danger" id="emailError"></small>

        <input id="mobile" class="form-control mb-2" placeholder="Mobile" />
        <small class="text-danger" id="mobileError"></small>

        <input id="dob" type="date" class="form-control mb-2" />
        <small class="text-danger" id="dobError"></small>

        <input id="city" class="form-control mb-2" placeholder="City" />
        <input id="address" class="form-control mb-2" placeholder="Address" />

        <button class="btn btn-success w-100">Register</button>
        ```
      </form>

      <hr />

      <h3 class="text-center mb-3">Login</h3>

      <input id="loginEmail" class="form-control mb-2" placeholder="Email" />
      <input id="loginPass" class="form-control mb-2" placeholder="Password" />

      <button onclick="login()" class="btn btn-primary w-100">Login</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
