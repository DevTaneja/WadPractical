<!doctype html>

<html>
  <head>
    <title>Student Marks</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <h3 class="text-center mb-4">Student Marks</h3>

      <div class="mb-3 text-center">
        <button onclick="loadAll()" class="btn btn-primary">
          All Students
        </button>
        <button onclick="loadDSBDA()" class="btn btn-warning">
          DSBDA > 20
        </button>
        <button onclick="loadTop()" class="btn btn-success">
          Top Students
        </button>
      </div>

      <table class="table table-bordered">
        <thead>
          <tr>
            <th>Name</th>
            <th>Roll</th>
            <th>WAD</th>
            <th>DSBDA</th>
            <th>CNS</th>
            <th>CC</th>
            <th>AI</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="data"></tbody>
      </table>
    </div>

    <script src="script.js"></script>
  </body>
</html>
