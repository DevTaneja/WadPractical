<!doctype html>

<html>
  <head>
    <title>Users</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <h3 class="text-center mb-4">Registered Users</h3>

      <table class="table table-bordered">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Age</th>
            <th>Event</th>
          </tr>
        </thead>
        <tbody id="data"></tbody>
      </table>
    </div>

    <script>
      let users = JSON.parse(localStorage.getItem("users")) || [];

      let table = document.getElementById("data");

      users.forEach((u) => {
        table.innerHTML += `
    <tr>
      <td>${u.name}</td>
      <td>${u.email}</td>
      <td>${u.age}</td>
      <td>${u.eventType}</td>
    </tr>
  `;
      });
    </script>
  </body>
</html>
