<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Listing</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f5f5f5;
      }
      .sidebar {
        background: white;
        padding: 15px;
        border-radius: 5px;
      }
      .card {
        border: none;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      .card img {
        height: 180px;
        object-fit: cover;
      }
    </style>
  </head>

  <body>
    <div class="container mt-4">
      <h3>Mugs</h3>

      <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3">
          <div class="sidebar">
            <h6>Target Market</h6>

            <div>
              <input type="checkbox" value="usa" onclick="filterProducts()" />
              USA
            </div>
            <div>
              <input
                type="checkbox"
                value="canada"
                onclick="filterProducts()"
              />
              Canada
            </div>
            <div>
              <input type="checkbox" value="uk" onclick="filterProducts()" /> UK
            </div>
          </div>
        </div>

        <!-- Products -->
        <div class="col-md-9">
          <div class="row">
            <div class="col-md-4 mb-4 product" data-category="usa">
              <div class="card">
                <img
                  src="https://via.placeholder.com/200"
                  class="card-img-top"
                />
                <div class="card-body">
                  <h6>Ceramic Mug</h6>
                  <p>₹299</p>
                </div>
              </div>
            </div>

            <div class="col-md-4 mb-4 product" data-category="canada">
              <div class="card">
                <img
                  src="https://via.placeholder.com/200"
                  class="card-img-top"
                />
                <div class="card-body">
                  <h6>Color Mug</h6>
                  <p>₹399</p>
                </div>
              </div>
            </div>

            <div class="col-md-4 mb-4 product" data-category="uk">
              <div class="card">
                <img
                  src="https://via.placeholder.com/200"
                  class="card-img-top"
                />
                <div class="card-body">
                  <h6>Black Mug</h6>
                  <p>₹349</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- External JS -->

    <script src="script.js"></script>
  </body>
</html>
